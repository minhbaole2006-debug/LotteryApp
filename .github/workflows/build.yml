name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          # Cài đặt buildozer trực tiếp từ git để lấy bản mới nhất
          pip3 install --user --upgrade git+https://github.com/kivy/buildozer.git
      
      - name: Build APK
        run: |
          # Ép buộc tạo thư mục và cấp quyền để buildozer không bị chặn
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # Chạy build mà không cần clean để tránh xóa nhầm dữ liệu đang tải
          buildozer android debug
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LotteryApp-APK
          path: bin/*.apk
