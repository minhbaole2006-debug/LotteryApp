name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade buildozer cython
      
      - name: Build APK
        run: |
          # Thiết lập cấu hình để vượt qua lỗi License
          mkdir -p ~/.android
          echo '### License accepted' > ~/.android/repositories.cfg
          # Chạy build
          buildozer android debug
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LotteryApp-APK
          path: bin/*.apk
