name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer
      
      - name: Build APK
        run: |
          # Thiết lập môi trường để buildozer tự cài đặt SDK mà không bị dừng lại bởi license
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # Dùng 'yes |' để tự động nhấn 'y' chấp nhận mọi điều khoản
          yes | buildozer android debug
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LotteryApp-APK
          path: bin/*.apk
